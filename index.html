<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Solution Gazon</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:#f4f6f8; padding:15px; color: #333; }
        .container { background:white; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { color: #2e7d32; margin-top: 0; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select { width:100%; padding:12px; margin:8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width:100%; padding:15px; margin-top:12px; background:#2e7d32; color:white; border:none; border-radius:12px; cursor: pointer; font-weight: bold; font-size: 16px; -webkit-appearance: none; }
        button.secondary { background: #546e7a; }
        button.export { background: #1565c0; }
        .result { background:#e8f5e9; padding:15px; border-radius:12px; border-left: 6px solid #2e7d32; margin-top: 15px; }
        img.preview { width:100%; max-width: 300px; margin-top:15px; border-radius: 10px; display: block; margin-left: auto; margin-right: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<img src="logo.png" alt="MC Solution Gazon" style="width:140px; display:block; margin: 10px auto;">

<div class="container">
    <h3>Client Calculator</h3>
    
    <label>Client Name</label>
    <input id="client" type="text" placeholder="Enter name">

    <label>Price per Visit ($)</label>
    <input id="price" type="number" value="65">

    <label>Weeks Remaining in Season</label>
    <input id="weeks" type="number" placeholder="Enter number of weeks">

    <label>Visits per Week</label>
    <input id="freq_input" type="number" value="1" step="0.1" placeholder="1 = Weekly, 0.5 = Bi-weekly">

    <button onclick="calculate()">Calculate & Save Sale</button>
    <div class="result" id="output" style="display:none;"></div>
</div>

<div class="container">
    <h3>Add Expense (Camera)</h3>
    <label>Amount ($)</label>
    <input id="expenseAmount" type="number" placeholder="0.00">
    
    <label>Category</label>
    <select id="category">
        <option>Gas</option>
        <option>Materials (Fertilizer/Seed)</option>
        <option>Equipment (Maintenance/Parts)</option>
        <option>Other</option>
    </select>
    
    <label>Receipt Photo</label>
    <input id="receipt" type="file" accept="image/*" capture="environment">
    
    <button onclick="saveExpense()">Save Expense</button>
    <div id="preview"></div>
</div>

<div class="container">
    <h3>Financial Reports</h3>
    <div class="stats-grid">
        <button class="secondary" onclick="exportData()">Export Data</button>
        <button class="secondary" onclick="document.getElementById('importFile').click()">Import Data</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    
    <button class="export" onclick="exportCSV()">Download Accountant CSV</button>
    <button style="background:#c62828" onclick="showStats()">Year-End Summary</button>
</div>

<script>
let db = JSON.parse(localStorage.getItem("mc_solution_data") || '{"sales":[], "expenses":[]}');

function saveDB() {
    localStorage.setItem("mc_solution_data", JSON.stringify(db));
}

function calculate(){
    let client = document.getElementById("client").value || "Client";
    let price = +document.getElementById("price").value;
    let weeks = +document.getElementById("weeks").value;
    let freq = +document.getElementById("freq_input").value;

    if(!weeks) { alert("Please enter the number of weeks"); return; }

    let totalVisits = weeks * freq;
    let subtotal = price * totalVisits;
    
    // Quebec Tax Logic
    let tps = subtotal * 0.05;
    let tvq = subtotal * 0.09975;
    let total = subtotal + tps + tvq;

    db.sales.push({ 
        date: new Date().toLocaleDateString(), 
        client, subtotal, tps, tvq, total 
    });
    saveDB();

    let out = document.getElementById("output");
    out.style.display = "block";
    out.innerHTML = `
        <strong>${client} - Contract Total</strong><br>
        Visits: ${totalVisits.toFixed(1)}<br>
        Subtotal: $${subtotal.toFixed(2)}<br>
        TPS: $${tps.toFixed(2)}<br>
        TVQ: $${tvq.toFixed(2)}<br><hr>
        <strong>Total: $${total.toFixed(2)}</strong>
    `;
}

function saveExpense(){
    let amount = +document.getElementById("expenseAmount").value;
    let category = document.getElementById("category").value;
    let file = document.getElementById("receipt").files[0];

    if(!amount) { alert("Enter an amount"); return; }

    let entry = { date: new Date().toLocaleDateString(), amount, category };

    if(file) {
        let reader = new FileReader();
        reader.onload = function(){
            entry.image = reader.result;
            db.expenses.push(entry);
            saveDB();
            document.getElementById("preview").innerHTML = `Saved $${amount} (${category})<br><img src="${reader.result}" class="preview">`;
        };
        reader.readAsDataURL(file);
    } else {
        db.expenses.push(entry);
        saveDB();
        alert("Expense saved.");
    }
}

function exportCSV() {
    let rows = [["Date", "Type", "Details", "Subtotal", "TPS", "TVQ", "Total"]];
    db.sales.forEach(s => rows.push([s.date, "Sale", s.client, s.subtotal, s.tps, s.tvq, s.total]));
    db.expenses.forEach(e => rows.push([e.date, "Expense", e.category, e.amount, 0, 0, e.amount]));

    let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
    let link = document.createElement("a");
    link.href = encodeURI(csvContent);
    link.download = `MC_Solution_Bookkeeping.csv`;
    link.click();
}

function showStats() {
    let rev = db.sales.reduce((sum, s) => sum + s.total, 0);
    let tps = db.sales.reduce((sum, s) => sum + s.tps, 0);
    let tvq = db.sales.reduce((sum, s) => sum + s.tvq, 0);
    let exp = db.expenses.reduce((sum, e) => sum + e.amount, 0);
    alert(`YEAR-END SUMMARY\n\nSales Total: $${rev.toFixed(2)}\nTPS Collected: $${tps.toFixed(2)}\nTVQ Collected: $${tvq.toFixed(2)}\nTotal Expenses: $${exp.toFixed(2)}\n\nNet Profit: $${(rev - exp).toFixed(2)}`);
}

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
    const link = document.createElement('a');
    link.href = dataStr;
    link.download = "mc_backup.json";
    link.click();
}

function importData(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => { db = JSON.parse(e.target.result); saveDB(); alert("Sync Complete!"); };
    reader.readAsText(file);
}
</script>
</body>
</html>
